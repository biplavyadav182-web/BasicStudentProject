<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sms-
        {% block title %}
        BasePage
        {% endblock title %}
    </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <!------- Nav-page starts from here ------->
    <nav class="navbar navbar-expand-lg bg-success navbar-dark py-6 fs-4">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#"><span class="text-danger">S</span>M<span
                    class="text-danger">S</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"

                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                    <li class="nav-item">

                    <li class="nav-item">

                    </li>

                    <li class="nav-item">

                    </li>

                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                    <button class="btn btn-danger" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>
    <!------- Nav-page starts from here ------->
    {% block content %}

    {% endblock content %}
    <!---- footer start from here ---->
    <footer class="text-center text-white bg-warning py-2 fs-3">
        designed by biplav@2062
    </footer>
    <!---- footer start from here ---->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
