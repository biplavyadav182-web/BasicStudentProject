{% extends "base.html" %}
{% load static %}
{% block title %}
StudentAddPage
{% endblock title %}

{% block content %}

<div class="container-fluid">
    <div class="row">
        <div class="col-5 mx-auto">
            <p class="text-center text-white bg-primary py-2 fs-3 mt-4 mb-4">Student Registration Page</p>
            <!----- Form starts Here ----->
            <form method="POST" action="{% url 'student_add' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">First Name</label>
                    <input type="text" name="firstname" class="form-control" id="exampleInputEmail1"
                        aria-describedby="emailHelp">
                </div>

                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Last Name</label>
                    <input type="text" name="lastname" class="form-control" id="exampleInputEmail1"
                        aria-describedby="emailHelp">
                </div>

                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Age</label>
                    <input type="number" name="age" class="form-control" id="exampleInputEmail1"
                        aria-describedby="emailHelp">
                </div>

                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control" id="exampleInputEmail1"
                        aria-describedby="emailHelp">
                </div>

                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Email address</label>
                    <input type="email" name="email" class="form-control" id="exampleInputEmail1"
                        aria-describedby="emailHelp">
                    <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
                </div>

                <div class="form-floating">
                    <textarea class="form-control mb-2 mt-2" placeholder="Leave a comment here" name="mssg"
                        id="floatingTextarea2" style="height: 100px"></textarea>
                    <label for="floatingTextarea2">Comments</label>
                </div>

                <button type="submit" class="btn btn-primary mb-4">Submit</button>
            </form>

            <!----- Form Ends Here ----->
        </div>
    </div>
</div>

{% endblock content %}
